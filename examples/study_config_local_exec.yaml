# Example study configuration with auto-generated study name
study:
  # name: "local_single_trial_test_3"  # <- Comment out to use auto-generation
  # Will auto-generate unique name like: study_123456
  # No database - will use local SQLite storage in temp folder
  
optimization:
  # High-throughput optimization: Maximize token generation rate
  approach: "multi_objective"
  objective:
    metric: "output_tokens_per_second"  # Throughput optimization
    direction: "maximize"
    percentile: "mean"  # Use median for stable results
  
  sampler: "tpe"
  n_trials: 1
  
  # Alternative: Use preset for common configurations
  # preset: "high_throughput"
  
benchmark:
  benchmark_type: "guidellm"
  model: "RedHatAI/Qwen3-1.7B-FP8-dynamic"  # Small model for quick testing
  max_seconds: 30                 # Short benchmark time
  dataset: null  # Use synthetic data
  prompt_tokens: 100   # Smaller for quick test
  output_tokens: 100
  rate: 10              # Low concurrency for local testing
  
logging:
  file_path: "/tmp/auto-tune-vllm-local-run/logs"  # Local temp folder
  log_level: "INFO"


  
parameters:
  max_num_batched_tokens:
    enabled: true
    # Uses schema defaults: min=1024, max=32768, step=1024
    
  gpu_memory_utilization:
    enabled: true
    min: 0.9
    max: 0.95
    step: 0.01
    
  block_size:
    enabled: true
    # Uses schema defaults: [8, 16, 32, 64, 128]
    
  kv_cache_dtype:
    enabled: true
    options: ["auto", "fp8"]
    
  cuda_graph_sizes:
    enabled: true
    min: 8
    max: 8192
    step: 128
    
  long_prefill_token_threshold:
    enabled: true
    # Uses schema defaults: [0, 256, 512, 1024, 2048, 4096, 8192, 11500]
    
  max_seq_len_to_capture:
    enabled: true
    options: [4096, 8192, 12288]
    
  max_num_partial_prefills:
    enabled: true
    # Uses schema defaults: [1, 2, 4, 8]
    
  compilation_config:
    enabled: false
    # Available: [0, 1, 2, 3] - disabled for stability
    
  enable_cuda_graphs:
    enabled: false
    
  enable_prefix_caching:
    enabled: true
    # Boolean parameter - will test both true/false
    
  preemption_mode:
    enabled: false
    # Available: ["recompute", "swap"] - disabled for local testing
